<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Team68 Wireframe | Ingresos</title>
	<link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link href="../vendor/introjs/introjs.min.css" rel="stylesheet">
	<link id="themeStylesheet" rel="stylesheet" href="" data-wireframe="../assets/css/wireframe.css" data-modern="../assets/css/modern.css" data-y2k="../assets/css/y2k.css" data-hollow="../assets/css/hollow.css">
</head>
<body>
	<nav class="navbar navbar-expand-lg border-bottom">
		<div class="container">
			<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="welcome.html">
				<img src="../assets/images/logo.svg" alt="Team68" width="140" height="36">
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Mostrar menu">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="mainNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" href="summary.html">Resumen</a></li>
					<li class="nav-item"><a class="nav-link active" href="income.html">Ingresos</a></li>
					<li class="nav-item"><a class="nav-link" href="expense.html">Gastos</a></li>
					<li class="nav-item"><a class="nav-link" href="history.html">Historial</a></li>
					<li class="nav-item"><a class="nav-link" href="logout.html">Logout</a></li>
				</ul>
				<div class="d-flex align-items-center gap-2 ms-lg-3 mt-3 mt-lg-0">
					<button class="btn btn-outline-secondary btn-sm nav-help-btn" type="button" id="pageHelpTrigger" aria-label="Mostrar ayuda de la pagina">
						<ion-icon name="help-circle-outline"></ion-icon>
						<span></span>
					</button>
					<label for="themeSelector" class="small mb-0">Estilo</label>
					<select id="themeSelector" class="form-select form-select-sm" style="min-width: 132px;" aria-label="Selector de estilo">
						<option value="default">Default (Bootstrap)</option>
						<option value="wireframe">Wireframe</option>
						<option value="modern">Modern</option>
						<option value="y2k">Y2K</option>
						<option value="hollow">Hollow</option>
					</select>
				</div>
			</div>
		</div>
	</nav>

	<main class="container py-4 py-md-5">
		<section class="rounded-3 border p-4 mb-4" id="incomeForm">
			<h1 class="h3 mb-3">Registrar ingreso</h1>
			<form class="row g-3">
				<div class="col-md-6">
					<label for="conceptoIngreso" class="form-label">Concepto</label>
					<input id="conceptoIngreso" type="text" class="form-control" placeholder="Ej. Salario">
				</div>
				<div class="col-md-3">
					<label for="montoIngreso" class="form-label">Monto</label>
					<input id="montoIngreso" type="number" class="form-control" placeholder="0.00">
				</div>
				<div class="col-md-3">
					<label for="fechaIngreso" class="form-label">Fecha</label>
					<input id="fechaIngreso" type="date" class="form-control">
				</div>
				<div class="col-md-6">
					<label for="categoriaIngreso" class="form-label">Categoria</label>
					<select id="categoriaIngreso" class="form-control">
						<option>Trabajo</option>
						<option>Freelance</option>
						<option>Inversiones</option>
						<option>Otros</option>
					</select>
				</div>
				<div class="col-md-6">
					<label for="cuentaIngreso" class="form-label">Cuenta</label>
					<select id="cuentaIngreso" class="form-control">
						<option>Banco principal</option>
						<option>Billetera</option>
						<option>Efectivo</option>
					</select>
				</div>
				<div class="col-12">
					<label for="notaIngreso" class="form-label">Nota</label>
					<textarea id="notaIngreso" class="form-control" rows="3" placeholder="Detalle opcional"></textarea>
				</div>
				<div class="col-12 d-flex gap-2">
					<button type="button" class="btn btn-primary"><ion-icon name="save-outline"></ion-icon> Guardar ingreso</button>
					<a class="btn btn-outline-secondary" href="summary.html"><ion-icon name="close-circle-outline"></ion-icon> Cancelar</a>
				</div>
			</form>
		</section>

		<section class="card" id="incomeRecent">
			<div class="card-body">
				<h2 class="h5 mb-3">Ingresos recientes</h2>
				<ul class="mb-0">
					<li>16/07/2026 - Salario - $2,400</li>
					<li>14/07/2026 - Freelance - $800</li>
					<li>10/07/2026 - Venta de equipo - $150</li>
				</ul>
			</div>
		</section>
	</main>

	<script src="../vendor/introjs/intro.min.js"></script>
	<script type="module" src="../vendor/ionicons/ionicons.esm.js"></script>
	<script src="../assets/js/theme-switcher.js"></script>
	<script src="../assets/js/page-help.js"></script>
	<script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
