<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <title>Team68 Salud Financiera | Historial</title>
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../vendor/introjs/introjs.min.css" rel="stylesheet">
  <link href="../vendor/sweetalert2/sweetalert2.min.css" rel="stylesheet">
  <link id="themeStylesheet" rel="stylesheet" href="" data-wireframe="../assets/css/wireframe.css" data-modern="../assets/css/modern.css" data-y2k="../assets/css/y2k.css" data-hollow="../assets/css/hollow.css">
  <style>
    .chart-shell {
      min-height: 320px;
      padding: 12px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="welcome.html">
        <img src="../assets/images/logo.svg" alt="Team68" width="140" height="36">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Mostrar menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="summary.html">Resumen</a></li>
          <li class="nav-item"><a class="nav-link" href="income.html">Ingresos</a></li>
          <li class="nav-item"><a class="nav-link" href="expense.html">Gastos</a></li>
          <li class="nav-item"><a class="nav-link active" href="history.html">Historial</a></li>
          <li class="nav-item"><a class="nav-link" href="salud-financiera.html">Salud financiera</a></li>
          <li class="nav-item"><a class="nav-link" href="logout.html">Logout</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2 ms-lg-3 mt-3 mt-lg-0">
          <button class="btn btn-outline-secondary btn-sm nav-help-btn" type="button" id="pageHelpTrigger" aria-label="Mostrar ayuda de la pagina">
            <ion-icon name="help-circle-outline"></ion-icon>
            <span></span>
          </button>
          <label for="themeSelector" class="small mb-0">Estilo</label>
          <select id="themeSelector" class="form-select form-select-sm" style="min-width: 132px;" aria-label="Selector de estilo">
            <option value="default">Default (Bootstrap)</option>
            <option value="wireframe">Wireframe</option>
            <option value="modern">Modern</option>
            <option value="y2k">Y2K</option>
            <option value="hollow">Hollow</option>
          </select>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4 py-md-5">
    <section class="rounded-3 border p-4 mb-4" id="historyFilters">
      <h1 class="h3 mb-3">Historial de movimientos</h1>
      <form class="row g-3 align-items-end">
        <div class="col-md-3">
          <label for="desde" class="form-label">Desde</label>
          <input id="desde" type="date" class="form-control">
        </div>
        <div class="col-md-3">
          <label for="hasta" class="form-label">Hasta</label>
          <input id="hasta" type="date" class="form-control">
        </div>
        <div class="col-md-3">
          <label for="tipo" class="form-label">Tipo</label>
          <select id="tipo" class="form-control">
            <option value="Todos">Todos</option>
            <option value="Ingreso">Ingreso</option>
            <option value="Gasto">Gasto</option>
          </select>
        </div>
        <div class="col-md-3">
          <label for="categoria" class="form-label">Categoria</label>
          <select id="categoria" class="form-control">
            <option value="Todas">Todas</option>
            <option value="Trabajo">Trabajo</option>
            <option value="Freelance">Freelance</option>
            <option value="Inversiones">Inversiones</option>
            <option value="Alimentacion">Alimentacion</option>
            <option value="Transporte">Transporte</option>
            <option value="Servicios">Servicios</option>
            <option value="Salud">Salud</option>
            <option value="Otros">Otros</option>
          </select>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="button" class="btn btn-primary" id="applyFiltersBtn"><ion-icon name="funnel-outline"></ion-icon> Aplicar filtros</button>
          <button type="button" class="btn btn-outline-secondary" id="clearFiltersBtn"><ion-icon name="refresh-outline"></ion-icon> Limpiar</button>
        </div>
      </form>
    </section>

    <section class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="card h-100">
          <div class="card-body">
            <h3 class="h6">Total ingresos filtrados</h3>
            <p class="display-6 mb-0" id="historyIncomeTotal">$3,200</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card h-100">
          <div class="card-body">
            <h3 class="h6">Total gastos filtrados</h3>
            <p class="display-6 mb-0" id="historyExpenseTotal">$1,920</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card h-100">
          <div class="card-body">
            <h3 class="h6">Balance filtrado</h3>
            <p class="display-6 mb-0" id="historyBalanceTotal">$1,280</p>
          </div>
        </div>
      </div>
    </section>

    <section class="card mb-4" id="historyResults">
      <div class="card-body">
        <h2 class="h5 mb-3">Resultados</h2>
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Concepto</th>
                <th>Categoria</th>
                <th>Tipo</th>
                <th>Cuenta</th>
                <th class="text-end">Monto</th>
              </tr>
            </thead>
            <tbody id="historyMovementsBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card mb-4" id="historyChartCard">
      <div class="card-body">
        <h2 class="h5 mb-3">Gastos por categoria</h2>
        <div class="chart-shell">
          <canvas id="expenseCategoryChart" aria-label="Grafica de gastos por categoria" role="img"></canvas>
        </div>
      </div>
    </section>

    <section class="card" id="historyIncomeChartCard">
      <div class="card-body">
        <h2 class="h5 mb-3">Ingresos por categoria</h2>
        <div class="chart-shell">
          <canvas id="incomeCategoryChart" aria-label="Grafica de ingresos por categoria" role="img"></canvas>
        </div>
      </div>
    </section>

  </main>

  <script src="../vendor/introjs/intro.min.js"></script>
  <script type="module" src="../vendor/ionicons/ionicons.esm.js"></script>
  <script src="../vendor/sweetalert2/sweetalert2.min.js"></script>
  <script src="../assets/js/theme-switcher.js"></script>
  <script src="../assets/js/page-help.js"></script>
  <script src="../assets/js/movements-local.js"></script>
  <script src="../vendor/chartjs/chart.umd.min.js"></script>
  <script>
    let currentHistoryRows = [];
    let expenseChart = null;
    let incomeChart = null;

    function getChartSeries(rows) {
      const categoryTotals = {};

      rows.forEach(function (item) {
        if (item.tipo !== "Gasto") {
          return;
        }

        const category = item.categoria || "Otros";
        const amount = Math.abs(Number(item.monto || 0));
        categoryTotals[category] = (categoryTotals[category] || 0) + amount;
      });

      const labels = Object.keys(categoryTotals);
      const values = labels.map(function (label) {
        return categoryTotals[label];
      });

      if (!labels.length) {
        return {
          labels: ["Sin datos"],
          values: [0]
        };
      }

      return {
        labels: labels,
        values: values
      };
    }

    function getIncomeChartSeries(rows) {
      const categoryTotals = {};

      rows.forEach(function (item) {
        if (item.tipo !== "Ingreso") {
          return;
        }

        const category = item.categoria || "Otros";
        const amount = Math.abs(Number(item.monto || 0));
        categoryTotals[category] = (categoryTotals[category] || 0) + amount;
      });

      const labels = Object.keys(categoryTotals);
      const values = labels.map(function (label) {
        return categoryTotals[label];
      });

      if (!labels.length) {
        return {
          labels: ["Sin datos"],
          values: [0]
        };
      }

      return {
        labels: labels,
        values: values
      };
    }

    function getCurrentFilteredRows() {
      if (!window.fintrackMovements) {
        return [];
      }

      const filters = {
        desde: document.getElementById("desde") ? document.getElementById("desde").value : "",
        hasta: document.getElementById("hasta") ? document.getElementById("hasta").value : "",
        tipo: document.getElementById("tipo") ? document.getElementById("tipo").value : "Todos",
        categoria: document.getElementById("categoria") ? document.getElementById("categoria").value : "Todas"
      };

      return window.fintrackMovements.filter(window.fintrackMovements.getAll(), filters);
    }

    function renderExpenseChart() {
      const chartCanvas = document.getElementById("expenseCategoryChart");
      if (!chartCanvas) {
        return;
      }

      const chartSeries = getChartSeries(currentHistoryRows);

      if (expenseChart) {
        expenseChart.destroy();
      }

      const dataset = {
        label: "Gasto (USD)",
        data: chartSeries.values
      };

      const chartOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return "$" + context.raw;
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              callback: function(value) {
                return "$" + value;
              }
            }
          },
          x: {
            grid: {
              display: false
            }
          }
        }
      };

      expenseChart = new Chart(chartCanvas, {
        type: "bar",
        data: {
          labels: chartSeries.labels,
          datasets: [dataset]
        },
        options: chartOptions
      });
    }

    function renderIncomeChart() {
      const chartCanvas = document.getElementById("incomeCategoryChart");
      if (!chartCanvas) {
        return;
      }

      const chartSeries = getIncomeChartSeries(currentHistoryRows);

      if (incomeChart) {
        incomeChart.destroy();
      }

      const dataset = {
        label: "Ingreso (USD)",
        data: chartSeries.values
      };

      const chartOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return "$" + context.raw;
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              callback: function(value) {
                return "$" + value;
              }
            }
          },
          x: {
            grid: {
              display: false
            }
          }
        }
      };

      incomeChart = new Chart(chartCanvas, {
        type: "bar",
        data: {
          labels: chartSeries.labels,
          datasets: [dataset]
        },
        options: chartOptions
      });
    }

    currentHistoryRows = getCurrentFilteredRows();
    renderExpenseChart();
    renderIncomeChart();

    document.addEventListener("fintrack:history-data-change", function (event) {
      currentHistoryRows = event.detail && Array.isArray(event.detail.rows) ? event.detail.rows : [];
      renderExpenseChart();
      renderIncomeChart();
    });

    document.addEventListener("fintrack:theme-change", function () {
      renderExpenseChart();
      renderIncomeChart();
    });
  </script>
  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
