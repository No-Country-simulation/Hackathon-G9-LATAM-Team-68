<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
  	<link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
	<title>Team68 Salud Financiera | Resumen</title>
	<link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link href="../vendor/introjs/introjs.min.css" rel="stylesheet">
	<link href="../vendor/sweetalert2/sweetalert2.min.css" rel="stylesheet">
	<link id="themeStylesheet" rel="stylesheet" href="" data-wireframe="../assets/css/wireframe.css" data-modern="../assets/css/modern.css" data-y2k="../assets/css/y2k.css" data-hollow="../assets/css/hollow.css">
</head>
<body>
	<nav class="navbar navbar-expand-lg border-bottom">
		<div class="container">
			<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="welcome.html">
				<img src="../assets/images/logo.svg" alt="Team68" width="140" height="36">
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Mostrar menu">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="mainNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link active" href="summary.html">Resumen</a></li>
					<li class="nav-item"><a class="nav-link" href="income.html">Ingresos</a></li>
					<li class="nav-item"><a class="nav-link" href="expense.html">Gastos</a></li>
					<li class="nav-item"><a class="nav-link" href="history.html">Historial</a></li>
					<li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
					<li class="nav-item"><a class="nav-link" href="logout.html">Logout</a></li>
				</ul>
				<div class="d-flex align-items-center gap-2 ms-lg-3 mt-3 mt-lg-0">
					<button class="btn btn-outline-secondary btn-sm nav-help-btn" type="button" id="pageHelpTrigger" aria-label="Mostrar ayuda de la pagina">
						<ion-icon name="help-circle-outline"></ion-icon>
						<span></span>
					</button>
					<label for="themeSelector" class="small mb-0">Estilo</label>
					<select id="themeSelector" class="form-select form-select-sm" style="min-width: 132px;" aria-label="Selector de estilo">
						<option value="default">Default (Bootstrap)</option>
						<option value="wireframe">Wireframe</option>
						<option value="modern">Modern</option>
						<option value="y2k">Y2K</option>
						<option value="hollow">Hollow</option>
					</select>
				</div>
			</div>
		</div>
	</nav>

	<main class="container py-4 py-md-5">
		<section class="rounded-3 border p-4 mb-4" id="summaryHeader">
			<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
				<div>
					<h1 class="h3 mb-1">Resumen mensual</h1>
					<small>Julio 2026</small>
				</div>
				<div class="d-flex gap-2 flex-wrap">
					<a href="income.html" class="btn btn-primary"><ion-icon name="add-circle-outline"></ion-icon> Nuevo ingreso</a>
					<a href="expense.html" class="btn btn-outline-secondary"><ion-icon name="remove-circle-outline"></ion-icon> Nuevo gasto</a>
					<a href="history.html" class="btn btn-outline-secondary"><ion-icon name="time-outline"></ion-icon> Ver historial</a>
				</div>
			</div>
		</section>

		<section class="row g-3 mb-4" id="summaryTotals">
			<div class="col-md-4">
				<div class="card h-100">
					<div class="card-body">
						<h2 class="h6">Ingresos</h2>
						<p class="display-6 mb-0" id="summaryIncomeTotal">$3,200</p>
					</div>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card h-100">
					<div class="card-body">
						<h2 class="h6">Gastos</h2>
						<p class="display-6 mb-0" id="summaryExpenseTotal">$1,920</p>
					</div>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card h-100">
					<div class="card-body">
						<h2 class="h6">Balance</h2>
						<p class="display-6 mb-0" id="summaryBalanceTotal">$1,280</p>
					</div>
				</div>
			</div>
		</section>

		<section class="card" id="summaryMovements">
			<div class="card-body">
				<h2 class="h5 mb-3">Ultimos movimientos</h2>
				<div class="table-responsive">
					<table class="table align-middle mb-0">
						<thead>
							<tr>
								<th>Fecha</th>
								<th>Concepto</th>
								<th>Categoria</th>
								<th>Tipo</th>
								<th class="text-end">Monto</th>
							</tr>
						</thead>
						<tbody id="summaryMovementsBody"></tbody>
					</table>
				</div>
			</div>
		</section>
	</main>

	<script src="../vendor/introjs/intro.min.js"></script>
	<script type="module" src="../vendor/ionicons/ionicons.esm.js"></script>
	<script src="../vendor/sweetalert2/sweetalert2.min.js"></script>
	<script src="../assets/js/theme-switcher.js"></script>
	<script src="../assets/js/page-help.js"></script>
	<script src="../assets/js/movements-local.js"></script>
	<script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
